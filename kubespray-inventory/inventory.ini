[k8s_cluster:children]
kube_control_plane
kube_node

[all:vars]
# Пользователь для SSH (должен иметь sudo без пароля или с паролем, но ansible_become=true)
ansible_user=ansible
ansible_become=true
# Если используется SSH-ключ
# ansible_ssh_private_key_file=/home/ansible/.ssh/id_rsa

# Виртуальный IP (VIP) для доступа к API-серверу
# Важно: VIP должен быть в той же подсети, что и мастер-узлы, и быть свободным
apiserver_loadbalancer_domain_name="vip.k8s.local"  # можно оставить так, но лучше задать IP
loadbalancer_apiserver_address="10.0.0.100"          # замените на подходящий IP из вашей сети
loadbalancer_apiserver_port=6443
